    <line x1="-14" y1="0" x2="14" y2="0" stroke="#1B3A6B" stroke-width="0.8" opacity="0.6" style="fill:rgb(0, 0, 0);stroke:rgb(27, 58, 107);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

