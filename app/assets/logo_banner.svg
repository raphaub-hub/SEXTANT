    <!-- ticks principaux (plus longs, plus épais) -->
    <line x1="105" y1="85" x2="109" y2="97" stroke-width="2.5" style="fill:rgb(0, 0, 0);stroke:rgb(27, 58, 107);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>  <!-- 0° -->
    <line x1="158" y1="93" x2="161" y2="105" stroke-width="2.5" style="fill:rgb(0, 0, 0);stroke:rgb(27, 58, 107);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>  <!-- ~30° -->
    <line x1="200" y1="143" x2="210" y2="143" stroke-width="2.5" style="fill:rgb(0, 0, 0);stroke:rgb(27, 58, 107);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>  <!-- ~60° -->
    <line x1="215" y1="195" x2="203" y2="195" stroke-width="2.5" style="fill:rgb(0, 0, 0);stroke:rgb(27, 58, 107);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>  <!-- 90° -->
