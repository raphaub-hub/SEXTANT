  <!-- Double trait intérieur décoratif sur l'arc -->
  <path d="M 105 91 A 104 104 0 0 1 209 195" fill="none" stroke="#C9A227" stroke-width="1.2" stroke-linecap="round" opacity="0.6" style="fill:none;stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

