  <path d="M 91 204 Q 76 220 90 225 Q 106 230 111 218" fill="none" stroke="#C9A227" stroke-width="1.2" stroke-linecap="round" opacity="0.5" style="fill:none;stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

