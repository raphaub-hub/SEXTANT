  <line x1="248" y1="183.5" x2="635" y2="183.5" stroke="#1B3A6B" stroke-width="0.5" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(27, 58, 107);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

