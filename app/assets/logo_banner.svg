  <line x1="105" y1="195" x2="105" y2="48" stroke="#1B3A6B" stroke-width="3" stroke-linecap="round" opacity="0.35" style="fill:rgb(0, 0, 0);stroke:rgb(27, 58, 107);color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Arc principal — quart de cercle rayon 110, pivot (105,195), de 270° à 0° -->
